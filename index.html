<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        var t = localStorage.getItem("theme");
        if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Explore blocks, transactions, and accounts on the NEAR blockchain. Fast and lightweight explorer powered by FastNear." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>NEAR Rocks - NEAR explorer by FastNear</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
